backend:
  name: github
  repo: DanSullPCAndMacRepairAndDesign/codingPortfolio
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "name", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Run Demo?", name: "runDemo", widget: "boolean", default: false }
      - { label: "Demo URL", name: "demoUrl", widget: "string", required: false }
      - { label: "Code Files", name: "files", widget: "file", allow_multiple: true }
